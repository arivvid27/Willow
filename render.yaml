# render.yaml — Willow backend service definition for Render
# Render reads this file to know how to build and run the backend.
# Commit this file to your repo (in the backend/ folder or repo root).
#
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: willow-backend
    runtime: python
    region: oregon          # free tier available here
    plan: free

    # Build
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT

    rootDir: backend        # relative to repo root
                            # remove this line if you deploy the backend folder directly

    # Health check — Render uses this to know the service is up
    healthCheckPath: /health

    # Environment variables
    # Set these in the Render dashboard after first deploy,
    # OR let the deploy script set them via the Render API.
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: SUPABASE_URL
        sync: false         # set manually in dashboard / via API
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false         # set to your Vercel URL after deploying frontend
